<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E.P.T Conecta - Gerador de Currículo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- HEADER COM LOGO E.P.T CONECTA -->
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <svg class="logo-svg" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="30" cy="30" r="28" stroke="#FCD34D" stroke-width="3"/>
                    <path d="M20 20L40 40M20 40L40 20" stroke="#FCD34D" stroke-width="3" stroke-linecap="round"/>
                    <circle cx="30" cy="30" r="8" fill="#FCD34D" opacity="0.9"/>
                    <path d="M30 18V42M18 30H42" stroke="#FCD34D" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <span class="logo-text">E.P.T <strong>Conecta</strong></span>
            </div>
            <p class="header-subtitle">✨ Crie seu currículo profissional em minutos</p>
        </div>
        <div class="header-divider"></div>
    </header>

    <div class="container">
        <!-- FORMULÁRIO -->
        <div class="formulario">
            <div class="campo">
                <label>📸 Foto (opcional)</label>
                <input type="file" id="foto" accept="image/*">
            </div>
            
            <div class="campo">
                <label>👤 Nome Completo *</label>
                <input type="text" id="nome" placeholder="Ex: João Silva Santos">
            </div>
            
            <div class="campo">
                <label>📅 Idade *</label>
                <input type="number" id="idade" placeholder="25">
            </div>
            
            <div class="campo">
                <label>📧 E-mail *</label>
                <input type="email" id="email" placeholder="joao@email.com">
            </div>
            
            <div class="campo">
                <label>📱 Telefone *</label>
                <input type="tel" id="telefone" placeholder="(11) 99999-9999">
            </div>

            <!-- ENDEREÇO COMPLETO -->
            <div class="campo">
                <label>📍 Endereço</label>
            </div>
            <div class="campo-linha">
                <div class="campo">
                    <label>Rua *</label>
                    <input type="text" id="rua" placeholder="Ex: Rua das Flores">
                </div>
                <div class="campo">
                    <label>Número *</label>
                    <input type="text" id="numero" placeholder="123">
                </div>
            </div>
            <div class="campo-linha">
                <div class="campo">
                    <label>Bairro *</label>
                    <input type="text" id="bairro" placeholder="Ex: Centro">
                </div>
                <div class="campo">
                    <label>Cidade *</label>
                    <input type="text" id="cidade" placeholder="São Paulo">
                </div>
            </div>
            <div class="campo">
                <label>Estado/UF *</label>
                <input type="text" id="estado" placeholder="SP">
            </div>
            
            <div class="campo">
                <label>💬 Sobre Mim</label>
                <textarea id="sobre" rows="4" placeholder="Fale um pouco sobre você..."></textarea>
            </div>
            
            <div class="campo">
                <label>🎯 Objetivo Profissional</label>
                <input type="text" id="objetivo" placeholder="Ex: Desenvolvedor Front-end">
            </div>
            
            <div class="campo">
                <label>🛠️ Habilidades (separadas por vírgula)</label>
                <input type="text" id="habilidades" placeholder="HTML, CSS, JavaScript, React">
            </div>
            
            <div class="campo">
                <label>💼 Experiência Profissional</label>
                <textarea id="experiencia" rows="3" placeholder="Ex: Empresa X - 2020 a 2023 - Desenvolvedor..."></textarea>
            </div>
            
            <div class="campo">
                <label>🎓 Formação Acadêmica</label>
                <textarea id="formacao" rows="2" placeholder="Ex: Bacharel em Ciência da Computação - USP (2016-2020)"></textarea>
            </div>

            <div class="campo">
                <label>📚 Cursos Complementares</label>
                <textarea id="cursos" rows="3" placeholder="Ex: Informática Básica (Pacote Office)&#10;Atendimento ao Cliente"></textarea>
            </div>
            
            <div class="campo">
                <label>🌟 Hobbies/Interesses</label>
                <input type="text" id="hobbies" placeholder="Leitura, Música, Esportes">
            </div>

            <div class="campo">
                <label>📌 Informações Complementares</label>
                <textarea id="info_complementar" rows="3" placeholder="Ex: Disponibilidade para estágio&#10;Comprometimento e pontualidade"></textarea>
            </div>
            
            <div class="botoes">
                <button onclick="gerarCurriculo()" class="btn-gerar">
                    <span class="btn-icon">📄</span> GERAR CURRÍCULO
                </button>
                <button onclick="limparCampos()" class="btn-limpar">
                    <span class="btn-icon">🗑️</span> LIMPAR
                </button>
            </div>
        </div>
        
        <!-- PRÉVIA DO CURRÍCULO -->
        <div id="area-curriculo" style="display: none;">
            <div class="previa-header">
                <h2>📋 Seu Currículo</h2>
                <div class="previa-badge">✅ Pronto para baixar</div>
            </div>
            <div id="conteudo-pdf" class="pdf-container">
                <div id="previa-curriculo" class="curriculo"></div>
            </div>
            
            <div class="botoes">
                <button onclick="baixarPDF()" class="btn-pdf">
                    <span class="btn-icon">💾</span> BAIXAR PDF
                </button>
                <button onclick="imprimir()" class="btn-imprimir">
                    <span class="btn-icon">🖨️</span> IMPRIMIR
                </button>
            </div>
        </div>
        
        <footer>
            <p>✨ Seus dados não são salvos • E.P.T Conecta</p>
        </footer>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js">
    </script>
    <script src="script.js"></script>
</body>
</html>
