<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPT Conecta - Gerador de Currículo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- HEADER COM LOGO -->
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <span class="logo-icon">🚀</span>
                <span class="logo-text">EPT <strong>Conecta</strong></span>
            </div>
            <p class="header-subtitle">Crie seu currículo profissional em minutos</p>
        </div>
        <div class="header-divider"></div>
    </header>

    <div class="container">
        <!-- FORMULÁRIO -->
        <div class="formulario">
            <div class="campo">
                <label>📸 Foto (opcional)</label>
                <input type="file" id="foto" accept="image/*">
            </div>
            
            <div class="campo">
                <label>👤 Nome Completo *</label>
                <input type="text" id="nome" placeholder="Ex: João Silva Santos">
            </div>
            
            <div class="campo">
                <label>📅 Idade *</label>
                <input type="number" id="idade" placeholder="25">
            </div>
            
            <div class="campo">
                <label>📧 E-mail *</label>
                <input type="email" id="email" placeholder="joao@email.com">
            </div>
            
            <div class="campo">
                <label>📱 Telefone *</label>
                <input type="tel" id="telefone" placeholder="(11) 99999-9999">
            </div>

            <!-- ENDEREÇO COMPLETO -->
            <div class="campo">
                <label>📍 Endereço</label>
            </div>
            <div class="campo-linha">
                <div class="campo">
                    <label>Rua *</label>
                    <input type="text" id="rua" placeholder="Ex: Rua das Flores">
                </div>
                <div class="campo">
                    <label>Número *</label>
                    <input type="text" id="numero" placeholder="123">
                </div>
            </div>
            <div class="campo-linha">
                <div class="campo">
                    <label>Bairro *</label>
                    <input type="text" id="bairro" placeholder="Ex: Centro">
                </div>
                <div class="campo">
                    <label>Cidade *</label>
                    <input type="text" id="cidade" placeholder="São Paulo">
                </div>
            </div>
            <div class="campo">
                <label>Estado/UF *</label>
                <input type="text" id="estado" placeholder="SP">
            </div>
            
            <div class="campo">
                <label>💬 Sobre Mim</label>
                <textarea id="sobre" rows="4" placeholder="Fale um pouco sobre você, suas qualidades, perfil profissional, etc..."></textarea>
            </div>
            
            <div class="campo">
                <label>🎯 Objetivo Profissional</label>
                <input type="text" id="objetivo" placeholder="Ex: Desenvolvedor Front-end">
            </div>
            
            <div class="campo">
                <label>🛠️ Habilidades (separadas por vírgula)</label>
                <input type="text" id="habilidades" placeholder="HTML, CSS, JavaScript, React">
            </div>
            
            <div class="campo">
                <label>💼 Experiência Profissional</label>
                <textarea id="experiencia" rows="3" placeholder="Ex: Empresa X - 2020 a 2023 - Desenvolvedor..."></textarea>
            </div>
            
            <div class="campo">
                <label>🎓 Formação Acadêmica</label>
                <textarea id="formacao" rows="2" placeholder="Ex: Bacharel em Ciência da Computação - USP (2016-2020)"></textarea>
            </div>

            <!-- NOVO CAMPO: CURSOS COMPLEMENTARES -->
            <div class="campo">
                <label>📚 Cursos Complementares</label>
                <textarea id="cursos" rows="3" placeholder="Ex: Informática Básica (Pacote Office)&#10;Atendimento ao Cliente&#10;Comunicação e Trabalho em Equipe"></textarea>
            </div>
            
            <div class="campo">
                <label>🌟 Hobbies/Interesses</label>
                <input type="text" id="hobbies" placeholder="Leitura, Música, Esportes">
            </div>

            <div class="campo">
                <label>📌 Informações Complementares</label>
                <textarea id="info_complementar" rows="3" placeholder="Ex: Disponibilidade para estágio&#10;Comprometimento e pontualidade&#10;Facilidade em lidar com o público"></textarea>
            </div>
            
            <div class="botoes">
                <button onclick="gerarCurriculo()" class="btn-gerar">📄 GERAR CURRÍCULO</button>
                <button onclick="limparCampos()" class="btn-limpar">🗑️ LIMPAR</button>
            </div>
        </div>
        
        <!-- PRÉVIA DO CURRÍCULO -->
        <div id="area-curriculo" style="display: none;">
            <h2>📋 Seu Currículo</h2>
            <div id="conteudo-pdf" class="pdf-container">
                <div id="previa-curriculo" class="curriculo"></div>
            </div>
            
            <div class="botoes">
                <button onclick="baixarPDF()" class="btn-pdf">💾 BAIXAR PDF</button>
                <button onclick="imprimir()" class="btn-imprimir">🖨️ IMPRIMIR</button>
            </div>
        </div>
        
        <footer>
            <p>Seus dados não são salvos</p>
        </footer>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js">
    </script>
    <script src="script.js"></script>
</body>
</html>
